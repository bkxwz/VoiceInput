name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore VoiceInput.App/VoiceInput.App.csproj

    - name: Build project
      run: dotnet build VoiceInput.App/VoiceInput.App.csproj --configuration Release

    - name: Publish project
      run: dotnet publish VoiceInput.App/VoiceInput.App.csproj --configuration Release --runtime win-x64 --self-contained -o ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: BuildOutput
        path: ./publish